# What is the goal of your workflow
# Goal: Whenever someone changes the Python code,
# the linter will check if the syntax, format, and indentation are correct.

name: Auto Linter

on:
  push:
    paths:
      - "**.py"

jobs:
  code:
    runs-on: ubuntu-latest

    steps:
      # This step will automatically clone the code of the current branch into the runner.
      - name: Checkout/Clone the code
        uses: actions/checkout@v7

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install the linter
      - name: Install Flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # Run the linter
      - name: Run Flake8
        run: flake8 .
